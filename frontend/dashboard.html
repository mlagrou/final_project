<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard - My services</title>

            <style>:root{
          --white: #ffffff; 
          --lightgrey: #dededeea;
          --darkgrey: #282b30;
          --blackish: #1c1e22;
          --lightorange: #FA8072;
          --darkorange: #FA8072;
          --accent-cool:	#407076;
          

                }
                #wrapper{
                    width: 80%;
                    margin: 0 auto;
                }

                .service{
                    display:flex;
                    flex-direction: column;
                    gap: 10px; 
                    margin: 10px;
                    padding:30px;
                    width: 30%; 
                    background-color: var(--lightgrey);



                }

                #servicesList{
                    display:flex;
                    flex-direction: column;
                    gap: 10px; 
                    margin: 10px;
                    padding:30px;
                    width: 090%; 
                    background-color: var(--lightgrey);
                }

                #fetchBtn{
                    width: 30%;
                }


                #featuresInput {
                    height:70px;
                    align-items: flex-start; 
                }

                #changes{
                    display: flex;
                    justify-content: space-around;
                    
                }

                ul{
                    list-style: none;
                    display: flex;
                    flex-direction: row;
                    flex-wrap: wrap;
                    gap: 20px;
                }

                li{
                    width: 45%;
                    padding: 10px
                }
                #fetchService{
                    display:flex;
                    flex-direction: column;
                    gap: 10px; 
                    margin: 10px;
                    padding:30px;
                    width: 090%; 
                    background-color: var(--lightgrey);
                }

                ul{
                    list-style: none;
                    display: flex;
                    flex-direction: row;
                    flex-wrap: wrap;
                    gap: 20px;
                }

                li{
                    width: 45%;
                    padding: 10px
                }


                body {
                    font-family: "Inter Tight", "Segoe UI", Helvetica, Arial, sans-serif;
                }


                h1{
                    font-family: "Inter Tight", Helvetica, sans-serif;
                    font-size: 2.25vw;
                    text-justify: center;

                }

                h2{
                    font-family: "Inter Tight", Helvetica, sans-serif;
                    font-size: 3.75vw;
                    margin: 0;
                    color: var(--blackish);
                }

                h3{
                    font-family: "Inter Tight", Helvetica, sans-serif;
                    font-size: 1.5vw;
                    margin: 0;
                    color: var(--accent-cool);
                }

                h4{
                    font-family: "Inter Tight", Helvetica, sans-serif;
                    font-size: 3.4vw;
                    font-weight: 300;
                    color: var(--lightorange);
                    text-align:center;
                    margin: 0;
                }

                h5{
                    font-family: "Inter Tight", Helvetica, sans-serif;
                    font-size: 2.4vw;
                    font-weight: 700;
                    margin: 0;
                    color: var(--accent-cool);

                }

                h6{
                    font-family: "Inter Tight", Helvetica, sans-serif;
                    font-size: 1.5vw;
                    font-weight: 300;
                    padding-left:1vw;
                    margin: 0;
                    color: var(--accent-cool);
                }
                .h7{
                    font-family: "Inter Tight", Helvetica, sans-serif;
                    font-size: 2.0vw;
                    font-weight: 500;
                    color: var(--lightgrey);
                    align-self: center;

                }
                textarea, button, input,  label{
                    padding: 10px;
                    font-size: 14px;
                    margin: 5px;
                }

                label {
                    display: flex;
                    align-items: center;
                    padding: 10px;
                    background-color: var(--white);
                    padding-left: 15px;
                    justify-content: flex-start;
                    gap: 30px;
                    border: 1px solid rgb(167, 167, 167)
                }
                #topline{
                    display: flex;
                    flex-direction: row;
                    justify-content: space-between;
                }
      </style>
</head>
<body>

<body>
    <div id = "wrapper">
        <div id="topline">
            <h1>athleteOS Service Management</h1>
            <button id="logout">Logout</button>
            </div>
        <div id="changes">

            <div class="service" id="firstService">

                <h3>Add a Service</h3>
                <input type="text" id="serviceName" placeholder="Service Name">

                <input type="number" id="monthlyPrice" placeholder="Monthly Price">
                <input type="number" id="annualPrice" placeholder="Annual Price">
                <textarea type="text" id="featuresInput" placeholder="Features (separated by commas)"></textarea>
                <label>isActive
                    <select name="isActive" id="isActive">
                        <option value="true">True</option>
                        <option value="false">False</option>
                    </select> 
                </label>
                <button id="addService">Add Service</button>
                <p id="message"></p>
            </div>

            <div class="service">

                <h3>Update a Service</h3>
                <input type="text" id="updateId" placeholder="Service ID">
                <input type="text" id="updateName" placeholder="Updated Name (optional)">
                <input type="number" id="updateMonth" placeholder="New Monthly Price (optional)">
                <input type="number" id="updateYear" placeholder="New Annual Price (optional)">
                <textarea type="text" id="updateFeatures" placeholder="New Features (optional - separated by commas)"></textarea>

                <label>
                    isActive:
                    <select id="updateActive">
                        <option value="">-- No change --</option>
                        <option value="true">true</option>
                        <option value="false">false</option>
                    </select>
                </label>
                <button id="updateBtn">Update Service</button>
                <p id="updateMessage"></p>
            </div>

            <div class="service">

                <h3>Delete a Service</h3>
                <input type="text" id="deleteId" placeholder="Service ID">
                <button id = "deleteBtn">Delete Service</button>
                <p id="deleteMessage"></p>
            </div>
            
        </div>
    <div id = 'servicesList'>
    <h3>View Services</h3>
    <button id="fetchBtn">Fetch Services</button>
    <div id="list"></div>
    </div>

  <script src="js/services.js"></script>
</body>
</html>
